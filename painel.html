<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel de Chamados - UNINTA</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    
    body {
      min-height: 100vh;
      background: radial-gradient(circle at top left, #8B0000 0%, #1a0000 50%, #000000 100%);
      padding: 20px;
      color: #1a1a1a;
    }
    
    .container { max-width: 1400px; margin: 0 auto; }
    
    .header {
      background: linear-gradient(135deg, #C8102E 0%, #8B0000 100%);
      padding: 25px 30px;
      border-radius: 15px;
      margin-bottom: 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    
    .header-title { color: white; }
    .header-title h1 { font-size: 26px; font-weight: 800; letter-spacing: 0.5px; }
    .header-title p { font-size: 13px; opacity: 0.9; margin-top: 3px; }
    
    .header-controls {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }
    
    .refresh-info {
      background: rgba(255, 255, 255, 0.15);
      padding: 10px 18px;
      border-radius: 25px;
      color: white;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-som {
      background: rgba(255, 255, 255, 0.15);
      color: white;
      border: 2px solid rgba(255,255,255,0.3);
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .btn-som:hover { background: rgba(255,255,255,0.25); }
    .btn-som.ativo { background: #FFC107; color: #4a0000; border-color: #FFC107; }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    @keyframes flash {
      0%, 100% { background: white; }
      50% { background: #fef3c7; }
    }
    
    .novo-chamado {
      animation: flash 1s ease 3;
    }
    
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .card {
      background: white;
      padding: 22px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      position: relative;
      overflow: hidden;
    }
    
    .card:hover { transform: translateY(-5px); }
    
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 5px;
      height: 100%;
    }
    
    .card.total::before { background: #C8102E; }
    .card.pendente::before { background: #ef4444; }
    .card.atendimento::before { background: #f59e0b; }
    .card.concluido::before { background: #10b981; }
    
    .card-label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    
    .card-value { font-size: 38px; font-weight: 800; color: #1a1a1a; }
    
    .card-icon {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 40px;
      opacity: 0.15;
    }
