<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamado Técnico</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; justify-content: center; padding: 20px; }
    .container { background: white; padding: 25px; border-radius: 10px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; margin-bottom: 20px; }
    label { margin-top: 15px; display: block; font-weight: bold; }
    input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; }
    button { margin-top: 20px; width: 100%; padding: 12px; background: #25D366; color: white; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; }
    button:hover { background: #1da851; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { text-align: center; margin-top: 10px; font-size: 14px; min-height: 20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>📢 Solicitação de Suporte</h2>
  <form id="formChamado">

    <label>Bloco</label>
    <select id="bloco" required>
      <option value="C" selected>Bloco C</option>
    </select>

    <label>Sala</label>
    <select id="sala" required>
      <option value="">Selecione a sala</option>
    </select>

    <label>Nome do Professor</label>
    <input type="text" id="nome" required placeholder="Ex: Prof. Maria Silva">

    <label>Problema</label>
    <select id="problema" required>
      <option value="">Selecione</option>
      <option>Projetor não liga</option>
      <option>Computador sem internet</option>
      <option>Som não funciona</option>
      <option>Ar-condicionado com problema</option>
      <option>Lâmpada queimada</option>
      <option>Cadeiras/mesas danificadas</option>
      <option>Outro</option>
    </select>

    <label>Observação</label>
    <textarea id="obs" rows="3" placeholder="Detalhes adicionais (opcional)"></textarea>

    <button type="submit" id="btnEnviar">Enviar pelo WhatsApp</button>
    <p id="status"></p>
  </form>
</div>

<script>
  const salasPorBloco = {
    C: [
      "Sala 1",
      "Sala 2",
      "Sala 3",
      "Sala 4",
      "Pequeno Grupo 1",
      "Pequeno Grupo 2",
      "Pequeno Grupo 3",
      "Pequeno Grupo 4",
      "Pequeno Grupo 5",
      "Pequeno Grupo 6",
      "Pequeno Grupo 7",
      "Pequeno Grupo 8",
      "Pequeno Grupo 9"
    ]
  };

  const blocoSelect = document.getElementById("bloco");
  const salaSelect = document.getElementById("sala");

  function carregarSalas(bloco) {
    salaSelect.innerHTML = '<option value="">Selecione a sala</option>';
    if (bloco && salasPorBloco[bloco]) {
      salasPorBloco[bloco].forEach(sala => {
        const opt = document.createElement("option");
        opt.value = sala;
        opt.textContent = sala;
        salaSelect.appendChild(opt);
      });
    }
  }

  // Carrega as salas automaticamente ao abrir a página
  carregarSalas(blocoSelect.value);

  blocoSelect.addEventListener("change", function() {
    carregarSalas(this.value);
  });

  const SHEET_URL = "https://script.google.com/macros/s/AKfycbwqmGSpJp0j60X4cD6FwkKa3dTRW-0cSPlCB7tcHu2ez5aeZlVwXp3ZjjpJatEjag2-/exec";
  const NUMERO_WHATSAPP = "5588981274826";

  document.getElementById("formChamado").addEventListener("submit", async function(e) {
    e.preventDefault();
    const btn = document.getElementById("btnEnviar");
    const status = document.getElementById("status");

    btn.disabled = true;
    btn.textContent = "Salvando...";
    status.textContent = "";
    status.style.color = "#666";

    const dados = {
      bloco: blocoSelect.value,
      sala: salaSelect.value,
      nome: document.getElementById("nome").value,
      problema: document.getElementById("problema").value,
      obs: document.getElementById("obs").value
    };

    try {
      await fetch(SHEET_URL, { method: "POST", body: JSON.stringify(dados) });

      const msg = `📢 *Chamado Técnico*\n🏫 Bloco: ${dados.bloco} | Sala: ${dados.sala}\n👨‍🏫 Professor: ${dados.nome}\n🔧 Problema: ${dados.problema}\n📝 Observação: ${dados.obs || "Nenhuma"}`;

      window.open(`https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(msg)}`, "_blank");

      status.textContent = "✅ Registrado! Envie a mensagem no WhatsApp.";
      status.style.color = "#25D366";
      btn.textContent = "Enviar pelo WhatsApp";
      btn.disabled = false;
    } catch (err) {
      status.textContent = "❌ Erro ao salvar. Verifique sua internet.";
      status.style.color = "#d32f2f";
      btn.disabled = false;
      btn.textContent = "Enviar pelo WhatsApp";
    }
  });
</script>

</body>
</html>
